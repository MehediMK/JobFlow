{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<section class="panel">
    <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
    </form>
</section>
{% endblock %}
