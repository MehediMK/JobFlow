{% extends 'base.html' %}
{% block page_title %}Choose New Password{% endblock %}
{% block content %}
<section class="auth-wrapper">
    <div class="auth-card auth-panel">
        <h2 class="auth-heading">Choose New Password</h2>
        <p class="auth-sub">Use a strong password you do not reuse on job portals.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_div }}
            <button class="btn btn-primary" type="submit">Update Password</button>
        </form>
    </div>
</section>
{% endblock %}
