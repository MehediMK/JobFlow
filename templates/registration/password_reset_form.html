{% extends 'base.html' %}
{% block page_title %}Reset Password{% endblock %}
{% block content %}
<section class="auth-wrapper">
    <div class="auth-card auth-panel">
        <h2 class="auth-heading">Reset Password</h2>
        <p class="auth-sub">Enter your account email and a reset link will be sent.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_div }}
            <button class="btn btn-primary" type="submit">Send Reset Link</button>
        </form>
    </div>
</section>
{% endblock %}
