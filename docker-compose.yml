services:
  web:
    build: .
    container_name: jobflow-pro
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - jobflow_media:/app/media
      - jobflow_static:/app/staticfiles
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"

volumes:
  jobflow_media:
  jobflow_static:
